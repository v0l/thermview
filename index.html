  <body>
    <!-- No-JS / Crawler Landing Content -->
    <noscript>
      <div style="max-width:720px;margin:80px auto;padding:0 24px;font-family:system-ui,-apple-system,sans-serif;color:#e0e0e0;background:#12121a;line-height:1.7">
        <h1 style="font-size:2.2rem;margin-bottom:0.3em;color:#fff">🌡️ ThermView</h1>
        <p style="font-size:1.15rem;color:#a0a0b8;margin-bottom:1.5em">
          <strong>Free, open-source thermal imaging analysis — in your browser.</strong>
        </p>
        <p>
          ThermView is a web-based tool for thermographers, inspectors, and engineers to view and analyze radiometric thermal images without installing any software.
        </p>
        <h2 style="font-size:1.3rem;margin-top:2em;color:#fff">Supported File Formats</h2>
        <ul style="padding-left:1.2em">
          <li><strong>Infiray IRG</strong> — C200, C210, P200, Autel Evo II Dual</li>
          <li><strong>Hikmicro JPEG</strong> — Pocket2, SP60 (radiometric JPEG)</li>
          <li><strong>DJI R-JPEG</strong> — Mavic 2 Enterprise Advanced</li>
        </ul>
        <h2 style="font-size:1.3rem;margin-top:2em;color:#fff">Features</h2>
        <ul style="padding-left:1.2em">
          <li>9 color palettes (Inferno, Iron, Jet, Hot, Lava, Plasma, Rainbow, Arctic, Grayscale)</li>
          <li>Linear, logarithmic, and histogram equalization scale modes</li>
          <li>Interactive temperature range bar with draggable handles</li>
          <li>Click-to-place spot measurements with crosshairs</li>
          <li>Min/max hotspot detection with on-canvas markers</li>
          <li>°C / °F unit toggle</li>
          <li>PNG export</li>
          <li>Emissivity, air temp, and other metadata display</li>
          <li>Dark theme purpose-built for thermal imaging workflows</li>
          <li>Drag &amp; drop file loading — no accounts, no uploads</li>
        </ul>
        <h2 style="font-size:1.3rem;margin-top:2em;color:#fff">Why ThermView?</h2>
        <p>
          Commercial thermography software is Windows-only, expensive, and locked to specific camera brands. FLIR Thermal Studio Pro costs hundreds per year. Fluke Connect is tied to Fluke hardware. Testo IRSoft is PC-only.
        </p>
        <p>
          ThermView runs in any browser, on any OS. It's the <strong>VS Code of thermal imaging</strong>: fast, cross-platform, extensible, and free.
        </p>
        <p style="margin-top:2.5em;padding:16px 20px;background:#1a1a28;border-radius:8px;border:1px solid #2a2a40">
          ⚡ <strong>Enable JavaScript</strong> to load the interactive thermal image viewer, or use a modern browser (Chrome, Firefox, Safari, Edge).
        </p>
        <p style="margin-top:2.5em;font-size:0.85rem;color:#5a5a78">
          <a href="https://github.com/user/thermview" style="color:#6a8aff">GitHub</a> · MIT License · Open Source
        </p>
      </div>
    </noscript>
